name: Cross-platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@v3.29.2

      - name: Install dependencies (macOS)
        run: |
          brew update
          brew install openssl opencv libpcap cmake git

      - name: Clone and build PcapPlusPlus (Linux/macOS)
        run: |
          git clone --depth 1 https://github.com/seladb/PcapPlusPlus.git
          cd PcapPlusPlus
          ./mk/configure-linux.sh --default || ./mk/configure-mac_os_x.sh --default
          make -j$(nproc || sysctl -n hw.ncpu)
          sudo make install
          sudo ldconfig || true

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release 

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test binaries
        run: |
          ./build/heiFIP --help || true
          ./build/main --help || true
        shell: bash
