name: Cross-platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    env:
      CMAKE_BUILD_TYPE: Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@v3.29.2

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libopencv-dev \
            libpcap-dev \
            libpthread-stubs0-dev \
            git

      - name: Install precompiled PcapPlusPlus (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -LO https://github.com/seladb/PcapPlusPlus/releases/download/v25.05/pcapplusplus-25.05-ubuntu-22.04-gcc-11.4.0-x86_64.tar.gz
          tar -xzf pcapplusplus-25.05-ubuntu-22.04-gcc-11.4.0-x86_64.tar.gz

          sudo cp -r include/* /usr/local/include/
          sudo cp -r lib/* /usr/local/lib/
          sudo ldconfig

      - name: Configure and Build (Ubuntu)
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_MANUAL_PCAPPLUSPLUS=ON \
            -DPcapPlusPlus_INCLUDE_DIRS="${GITHUB_WORKSPACE}/pcapplusplus/include" \
            -DPcapPlusPlus_LIBRARIES="${GITHUB_WORKSPACE}/pcapplusplus/lib/libCommon++.a\;${GITHUB_WORKSPACE}/pcapplusplus/lib/libPacket++.a\;${GITHUB_WORKSPACE}/pcapplusplus/lib/libPcap++.a" \
            -DUSE_MANUAL_OPENSSL=ON \
            -DOPENSSL_INCLUDE_DIR="/usr/include/openssl" \
            -DOPENSSL_CRYPTO_LIBRARY="/usr/lib/x86_64-linux-gnu/libcrypto.a"
          cmake --build build --config Release
